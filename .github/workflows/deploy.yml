name: Alive Bot#0667

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push image
        run: |
          IMAGE=ghcr.io/alive-bde/alive-bot:latest
          echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker buildx build --platform linux/arm64 -t $IMAGE --push .

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH }}
          port: 2222
          script: |
            IMAGE=ghcr.io/alive-bde/alive-bot:latest
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull $IMAGE
            docker stop alive-bot || true
            docker rm alive-bot || true
            docker run -d --name alive-bot --restart unless-stopped \
              -e DISCORD_TOKEN=${{ secrets.TOKEN }} \
              $IMAGE